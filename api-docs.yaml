openapi: 3.0.0
info:
  title: User & Report Management API
  version: 1.0.0
  description: API per registrazione utente, login/logout e gestione delle segnalazioni

servers:
  - url: http://localhost:3000/api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
        username:
          type: string

    Report:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        userId:
          type: string
        createdAt:
          type: string
          format: date-time

paths:

  /user:
    post:
      summary: Registra un nuovo utente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                username: { type: string }
                password: { type: string }
      responses:
        201:
          description: Utente registrato
        400:
          description: Dati non validi

  /session:
    post:
      summary: Login utente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        200:
          description: Login effettuato con successo
        400:
          description: Credenziali errate

  /logout:
    post:
      summary: Logout dell'utente autenticato
      security:
        - bearerAuth: []
      responses:
        200:
          description: Logout effettuato

  /user/{id}:
    delete:
      summary: Elimina il proprio account
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Account eliminato
        403:
          description: Non autorizzato
        404:
          description: Utente non trovato

  /protected:
    get:
      summary: Route di test per autenticazione
      security:
        - bearerAuth: []
      responses:
        200:
          description: Accesso riuscito all'area protetta

  /report:
    post:
      summary: Crea una nuova segnalazione
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: string }
                reportData:
                  type: object
                  properties:
                    title: { type: string }
                    description: { type: string }
                    tags:
                      type: array
                      items:
                        type: string
      responses:
        201:
          description: Segnalazione creata

  /report/{reportId}:
    get:
      summary: Ottiene una segnalazione specifica
      security:
        - bearerAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Segnalazione trovata
        404:
          description: Segnalazione non trovata

    delete:
      summary: Elimina una segnalazione
      security:
        - bearerAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Segnalazione eliminata
        404:
          description: Segnalazione non trovata

  /reports:
    get:
      summary: Ottiene tutte le segnalazioni
      responses:
        200:
          description: Elenco delle segnalazioni